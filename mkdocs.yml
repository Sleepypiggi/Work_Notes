site_name: Work Notes
site_url: https://example.com/
theme: 
  name: material
  palette:
    primary: black
    scheme: slate

nav:
  - Life Insurance: Placeholder.md
  - Products:
    - Non-Participating:
      - Term Life: 1_PRODUCTS/0_TERM_LIFE.md
      - Whole Life: 1_PRODUCTS/1_WHOLE_LIFE.md
    - Participating:
      - Overview: 1_PRODUCTS/3_PARTICIPATING.md
    - Universal Life:
      - Overview:  1_PRODUCTS/2_UNIVERSAL_LIFE/0_OVERVIEW.md
      - Traditional:  1_PRODUCTS/2_UNIVERSAL_LIFE/1_UL.md
      - Indexed:  1_PRODUCTS/2_UNIVERSAL_LIFE/2_IUL.md
    - Unit Linked:
      - Overview: 1_PRODUCTS/3_UNIT_LINKED\0_OVERVIEW.md
    - Annuities:
      - Overview: 1_PRODUCTS/5_ANNUITIES/0_OVERVIEW.md
      - Fixed: 1_PRODUCTS/5_ANNUITIES/1_FA.md
      - Indexed: 1_PRODUCTS/5_ANNUITIES/2_IA.md
      - Variable: 1_PRODUCTS/5_ANNUITIES/3_VA.md
    - Health:
      - Overview: Placeholder.md
    - Singapore: Placeholder.md
  - Valuation:
      - Solvency:
        - Risk Based Capital: 3_SOLVENCY/0_RISK_BASED_CAPITAL.md
        - Embedded Value: Placeholder.md
        - IFRS17: Placeholder.md
  - Reinsurance:
    - Overview: Placeholder.md
  - Distribution:
    - Overview: Placeholder.md
  - Experience Studies:
    - Overview: Placeholder.md
  - ALM:
    - Overview: Placeholder.md

markdown_extensions:

  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true

  # Python Markdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - config/extra.css

extra_javascript:
  - config/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js